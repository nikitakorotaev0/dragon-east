<!doctype html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Регистрация — Дзен</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div id="header"></div>



<main class="section">


<div class="container">


<div class="card auth-card">


<h1 class="page-title">
Регистрация клиента
</h1>




<input id="firstName"
type="text"
placeholder="Имя">



<input id="lastName"
type="text"
placeholder="Фамилия">



<input id="phone"
type="tel"
placeholder="Телефон">



<input id="email"
type="email"
placeholder="Email">



<input id="password"
type="password"
placeholder="Пароль">





<button class="btn"
onclick="register()">

Создать аккаунт

</button>





<p style="margin-top:20px;">

Уже есть аккаунт?

<a href="login.html">
Войти
</a>

</p>



</div>


</div>


</main>




<div id="footer"></div>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/auth.js"></script>

<script src="js/components.js"></script>

<script src="js/script.js"></script>


</body>

</html>
