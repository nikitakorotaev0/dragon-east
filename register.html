<!doctype html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Регистрация — Дракон Востока</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div id="header"></div>





<main class="section">


<div class="container">



<h1 class="page-title">
Регистрация клиента
</h1>




<div class="card form-card">



<form>



<label>
Имя
</label>


<input 
type="text"
placeholder="Введите имя">





<label>
Фамилия
</label>


<input 
type="text"
placeholder="Введите фамилию">





<label>
Дата рождения
</label>


<input 
type="date">





<label>
Email
</label>


<input 
type="email"
placeholder="example@mail.com">





<label>
Телефон
</label>


<input 
type="tel"
id="phone"
placeholder="+7 (900) 000-00-00"
maxlength="16">





<label>
Пароль
</label>


<input 
type="password"
placeholder="Введите пароль">





<button 
class="btn"
type="submit">

Создать аккаунт

</button>




</form>






<p style="margin-top:20px; text-align:center;">

Уже есть аккаунт?

<a href="login.html">
Войти
</a>


</p>




</div>



</div>


</main>






<div id="footer"></div>





<script src="js/components.js"></script>

<script src="js/script.js"></script>


</body>

</html>
