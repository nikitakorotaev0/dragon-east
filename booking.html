<!doctype html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Запись на массаж — Дракон Востока</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<div id="header"></div>





<main class="section">


<div class="container">



<h1 class="page-title">
Запись на массаж
</h1>






<div class="card form-card">


<form>





<h2>
Кого записываем?
</h2>




<label>

<input 
type="radio"
name="person"
checked>

Меня

</label>





<label>

<input 
type="radio"
name="person">

Другого человека

</label>






<h2 style="margin-top:30px;">
Данные посетителя
</h2>






<label>
ФИО
</label>


<input
type="text"
placeholder="Введите ФИО">





<label>
Телефон
</label>


<input
type="tel"
placeholder="+7 (900) 000-00-00">





<label>
Дата рождения
</label>


<input
type="date">







<h2 style="margin-top:30px;">
Выберите услугу
</h2>





<select>

<option>
Классический массаж
</option>

<option>
Восточный массаж
</option>

<option>
Массаж спины
</option>

<option>
Массаж лица
</option>


</select>








<h2 style="margin-top:30px;">
Выберите мастера
</h2>





<select>

<option>
Анна
</option>

<option>
Иван
</option>

</select>









<h2 style="margin-top:30px;">
Дата посещения
</h2>




<input
type="date">







<h2 style="margin-top:30px;">
Время
</h2>





<select>


<option>
10:00
</option>


<option>
11:30
</option>


<option>
14:00
</option>


<option>
16:00
</option>


<option>
18:00
</option>


</select>







<h2 style="margin-top:30px;">
Промокод
</h2>




<input
type="text"
placeholder="Введите промокод">







<button class="btn" type="submit">

Подтвердить запись

</button>





</form>


</div>




</div>


</main>





<div id="footer"></div>





<script src="../js/components.js"></script>

<script src="../js/script.js"></script>


</body>

</html>
