<!doctype html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Настройки — Админ-панель</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<div id="header"></div>




<main class="section">


<div class="container">



<h1 class="page-title">
Настройки
</h1>






<div class="card">


<h2>
Основные настройки
</h2>



<label>
Название салона
</label>


<input 
type="text"
value="Дракон Востока">





<label style="margin-top:15px;">
Телефон
</label>


<input
type="tel"
value="+7 (900) 000-00-00">





<label style="margin-top:15px;">
Email
</label>


<input
type="email"
value="info@dragon.ru">





<button class="btn" style="margin-top:20px;">

Сохранить

</button>



</div>







<div class="card" style="margin-top:30px;">


<h2>
Правила записи
</h2>



<p>
Максимальный срок записи:
14 дней вперёд
</p>



<p>
Автоматическая блокировка после:
2 пропусков
</p>



<button class="btn">

Изменить

</button>



</div>







<div class="card" style="margin-top:30px;">


<h2>
Уведомления
</h2>



<p>
Email-уведомления:
Включены
</p>



<p>
SMS:
Отключены
</p>



<button class="btn">

Настроить

</button>



</div>






</div>


</main>




<div id="footer"></div>





<script src="../js/components.js"></script>

<script src="../js/script.js"></script>


</body>

</html>
